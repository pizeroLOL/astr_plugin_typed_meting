name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: plugin

      - name: Clone AstrBot
        uses: actions/checkout@v4
        with:
          repository: AstrBotDevs/AstrBot
          path: astrbot

      - name: Move plugin into AstrBot structure
        run: |
          mkdir -p astrbot/data/plugins
          mv plugin astrbot/data/plugins/pylib-meting

      - name: Install uv & Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          python-version: "3.12"

      - name: Install plugin dependencies
        working-directory: astrbot/data/plugins/pylib-meting
        run: uv sync --frozen

      - name: Install AstrBot (editable)
        working-directory: astrbot/data/plugins/pylib-meting
        run: uv pip install -e ../../../

      - name: Lint with ruff
        working-directory: astrbot/data/plugins/pylib-meting
        run: uv run ruff check .

      - name: Test with unittest
        working-directory: astrbot/data/plugins/pylib-meting
        run: uv run python -m unittest discover -s tests -v
